<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Quête des Mathématiques - 4e Année</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .font-game { font-family: 'Bangers', cursive; tracking: 0.05em; }
        .card-aventure {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            border-bottom: 6px solid #e2e8f0;
        }
        .card-aventure:hover {
            transform: translateY(-5px);
            border-bottom-width: 2px;
            margin-bottom: 4px;
        }
        .map-bg {
            background-color: #f0fdf4;
            background-image: radial-gradient(#dcfce7 2px, transparent 2px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="map-bg min-h-screen">

    <nav class="bg-emerald-600 p-4 text-white shadow-xl flex justify-between items-center border-b-4 border-emerald-800">
        <h1 class="text-2xl font-game tracking-wider">⚔️ LA QUÊTE DES MATHS</h1>
        <button onclick="ouvrirAdmin()" class="bg-emerald-800 hover:bg-emerald-900 px-4 py-1 rounded-full text-xs uppercase font-bold transition">Espace Prof</button>
    </nav>

    <div id="auth-section" class="max-w-md mx-auto mt-16 p-8 bg-white rounded-3xl shadow-2xl border-4 border-emerald-100 text-center">
        <div class="mb-6">
            <div class="text-6xl mb-4">🧙‍♂️</div>
            <h2 class="text-3xl font-game text-emerald-800">Haltes-là, voyageur !</h2>
            <p class="text-slate-500 font-medium">Quel est ton nom d'aventurier ?</p>
        </div>
        <input type="text" id="studentName" placeholder="Ton prénom..." class="w-full p-4 bg-slate-100 border-2 border-slate-200 rounded-2xl mb-4 focus:border-emerald-500 focus:outline-none text-center text-xl font-bold">
        <button onclick="connexion()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-game text-2xl py-4 rounded-2xl shadow-[0_6px_0_0_#c2410c] active:shadow-none active:translate-y-1 transition-all">ENTRER DANS LE ROYAUME</button>
    </div>

    <div id="hub-section" class="hidden max-w-5xl mx-auto p-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border-2 border-emerald-100">
            <div class="text-center md:text-left">
                <p class="text-emerald-600 font-bold uppercase tracking-widest text-sm">Aventurier actuel</p>
                <h2 id="display-name" class="text-4xl font-game text-slate-800">---</h2>
            </div>
            <div class="mt-4 md:mt-0 flex gap-4">
                <div class="text-center">
                    <span class="block text-2xl">⭐</span>
                    <span id="rank-display" class="text-xs font-bold text-slate-500">Recrue</span>
                </div>
            </div>
        </div>

        <h3 class="text-xl font-game text-emerald-900 mb-6 flex items-center gap-2">
            <span class="bg-emerald-200 p-2 rounded-lg">📍</span> ÉTAPE 1 : LA FORÊT DES NOMBRES
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="modules-grid">
            </div>
    </div>

    <div id="quiz-section" class="hidden max-w-2xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl border-8 border-indigo-500">
        <div class="flex justify-between items-center mb-8">
            <div class="bg-indigo-100 text-indigo-700 font-bold px-4 py-1 rounded-full text-sm" id="question-count">Défi 1/5</div>
            <button onclick="location.reload()" class="text-slate-400 hover:text-red-500 font-bold">✕ S'enfuir</button>
        </div>
        
        <div id="quiz-content" class="text-center">
            <div class="text-5xl mb-6" id="quest-icon">💎</div>
            <h3 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 px-4">...</h3>
            
            <input type="text" id="answer-input" autocomplete="off" class="w-full max-w-xs p-4 border-b-4 border-indigo-200 text-4xl text-center focus:outline-none focus:border-indigo-500 mb-8 text-indigo-600 font-bold" placeholder="?">
            
            <button onclick="verifierReponse()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-game text-2xl py-4 rounded-2xl shadow-[0_6px_0_0_#3730a3] active:shadow-none active:translate-y-1 transition-all">LANCER MON SORT (RÉPONDRE)</button>
        </div>
    </div>

    <div id="admin-section" class="hidden max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border-t-8 border-emerald-800">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-game text-emerald-900">Registre du Maître (Admin)</h2>
            <button onclick="location.reload()" class="text-slate-500 underline text-sm font-bold">Quitter le registre</button>
        </div>
        <div class="overflow-x-auto rounded-lg border border-slate-100">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-slate-50 text-slate-600">
                        <th class="p-4 font-bold">Aventurier</th>
                        <th class="p-4 font-bold">Dernière Quête</th>
                        <th class="p-4 font-bold text-center">Semaine 1</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIJAy8ObBV6BeaIXJjrMkCfvtY4S7xBcM",
            authDomain: "sitemath-197b3.firebaseapp.com",
            projectId: "sitemath-197b3",
            storageBucket: "sitemath-197b3.firebasestorage.app",
            messagingSenderId: "118958876405",
            appId: "1:118958876405:web:e784ecf8e0d0a678e407bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = "";
        let userData = { name: "", progress: {} };
        let questions = [];
        let currentIdx = 0;
        let score = 0;

        // --- 1. CONNEXION & MÉMOIRE ---
        window.connexion = async function() {
            const name = document.getElementById('studentName').value.trim();
            if(!name) return alert("Indique ton nom !");
            
            currentUser = name.toLowerCase();
            const userRef = doc(db, "students", currentUser);
            const snap = await getDoc(userRef);

            if(snap.exists()) {
                userData = snap.data();
            } else {
                userData = { name: name, progress: {} };
                await setDoc(userRef, userData);
            }

            document.getElementById('display-name').innerText = userData.name;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('hub-section').classList.remove('hidden');
            rafraichirCarte();
        };

        // --- 2. CARTE D'AVENTURE ---
        function rafraichirCarte() {
            const grid = document.getElementById('modules-grid');
            grid.innerHTML = "";
            
            const chapitres = [
                { id: 1, titre: "Semaine 1", desc: "Position, valeur, lire et écrire", icon: "🌲" }
            ];

            chapitres.forEach(c => {
                const perc = userData.progress?.semaine1 || null;
                const estReussi = perc && parseInt(perc) >= 80;

                grid.innerHTML += `
                    <div onclick="window.lancerQuiz(1)" class="card-aventure p-6 rounded-2xl cursor-pointer relative">
                        ${estReussi ? '<span class="absolute -top-2 -right-2 text-3xl">🏆</span>' : ''}
                        <div class="text-4xl mb-3">${c.icon}</div>
                        <h4 class="font-game text-xl text-slate-800">${c.titre}</h4>
                        <p class="text-sm text-slate-500 mb-4">${c.desc}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold ${estReussi ? 'text-emerald-600' : 'text-indigo-600'}">
                                ${estReussi ? 'MAÎTRISÉ' : 'À CONQUÉRIR →'}
                            </span>
                            ${perc ? `<span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded font-bold">${perc}</span>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        // --- 3. GÉNÉRATEUR DE QUESTIONS (S1) ---
        window.lancerQuiz = function(semaine) {
            questions = [];
            for(let i=0; i<5; i++) {
                questions.push(genererQuestionS1());
            }
            currentIdx = 0; score = 0;
            document.getElementById('hub-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            afficherQuestion();
        };

        function genererQuestionS1() {
            const nbr = Math.floor(Math.random() * 8999) + 1001; 
            const types = ["pos", "val", "bond", "total"];
            const type = types[Math.floor(Math.random() * types.length)];

            if(type === "pos") {
                return { q: `Dans **${nbr}**, quel chiffre est à la position des **centaines** ?`, r: nbr.toString().charAt(1) };
            } else if(type === "val") {
                const digit = nbr.toString().charAt(0);
                return { q: `Quelle est la valeur du chiffre **${digit}** dans le nombre **${nbr}** ?`, r: (parseInt(digit)*1000).toString() };
            } else if(type === "bond") {
                return { q: `Quel est le nombre suivant ? <br> ${nbr}, ${nbr+10}, ${nbr+20}, ...`, r: (nbr+30).toString() };
            } else {
                return { q: `Combien y a-t-il de dizaines **au total** dans le nombre **${nbr}** ?`, r: Math.floor(nbr/10).toString() };
            }
        }

        function afficherQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-count').innerText = `Défi ${currentIdx + 1}/5`;
            document.getElementById('question-text').innerHTML = q.q;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        }

        // --- 4. VALIDATION (TOLÉRANCE AUX ESPACES) ---
        window.verifierReponse = async function() {
            const userAns = document.getElementById('answer-input').value.trim().replace(/\s+/g, '');
            const correctAns = questions[currentIdx].r.replace(/\s+/g, '');

            if(userAns === correctAns) {
                score++;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#10b981', '#6366f1'] });
            } else {
                alert(`Raté ! La réponse magique était : ${questions[currentIdx].r}`);
            }

            currentIdx++;
            if(currentIdx < questions.length) {
                afficherQuestion();
            } else {
                const finalPerc = Math.round((score/5)*100) + "%";
                await setDoc(doc(db, "students", currentUser), {
                    progress: { semaine1: finalPerc },
                    lastSeen: new Date()
                }, { merge: true });
                alert(`Quête terminée ! Ton score : ${finalPerc}`);
                location.reload();
            }
        };

        // --- 5. ESPACE PROF ---
        window.ouvrirAdmin = async function() {
            const pass = prompt("Mot de passe du Maître :");
            if(pass === "Mennais401") {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('hub-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                
                const snap = await getDocs(collection(db, "students"));
                const tbody = document.getElementById('admin-table-body');
                tbody.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-4 font-bold text-slate-700">${data.name}</td>
                            <td class="p-4 text-xs text-slate-400">${data.lastSeen?.toDate().toLocaleDateString() || '-'}</td>
                            <td class="p-4 text-center font-game text-indigo-600 text-xl">${data.progress?.semaine1 || '-'}</td>
                        </tr>`;
                });
            }
        };
    </script>
</body>
</html>
