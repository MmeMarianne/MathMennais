<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths 4e - Portail Élève</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold italic">M. Mennais - Maths 4e</h1>
        <button onclick="ouvrirAdmin()" class="text-xs opacity-70 hover:opacity-100 uppercase tracking-widest">Accès Prof</button>

    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center mb-8">
            <span class="text-5xl">🦊</span>
            <h2 class="text-2xl font-black text-slate-800 mt-4">Prêt pour le défi ?</h2>
        </div>
        <input type="text" id="studentName" placeholder="Ton prénom" class="w-full p-4 bg-slate-100 border-2 border-transparent rounded-xl mb-4 focus:border-indigo-500 focus:outline-none text-lg">

    </div>

    <div id="hub-section" class="hidden max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-end mb-8">
            <div>
                <p class="text-slate-500 font-medium">Bonjour,</p>
                <h2 id="display-name" class="text-4xl font-black text-slate-800">Élève</h2>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                <span class="text-sm text-slate-500">Étape actuelle :</span>
                <span class="block font-bold text-indigo-600">1 - Fondations [cite: 3]</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="modules-grid">
            <div onclick="lancerQuiz(1)" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-white hover:border-indigo-400 cursor-pointer transition-all group">
                <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <span class="text-2xl">🔢</span>
                </div>
                <h3 class="text-xl font-bold text-slate-800">Semaine 1</h3>
                <p class="text-slate-500 text-sm mt-2">Nombres naturels : position, valeur, lire et écrire. </p>
                <div class="mt-6 flex items-center text-indigo-600 font-bold text-sm">
                    JOUER MAINTENANT →
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-section" class="hidden max-w-2xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl border-4 border-indigo-100">
        <div class="flex justify-between items-center mb-8">
            <span id="question-count" class="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full text-slate-600">Question 1/5</span>
            <button onclick="quitterQuiz()" class="text-slate-400 hover:text-red-500">✕ Quitter</button>
        </div>
        <div id="question-container" class="text-center">
            <h3 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">Chargement...</h3>
            <input type="text" id="answer-input" class="w-full p-4 border-b-4 border-indigo-200 text-3xl text-center focus:outline-none focus:border-indigo-500 mb-8" placeholder="Ta réponse">
            <button onclick="verifierReponse()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg transition shadow-green-200">VALIDER</button>
        </div>
    </div>

    <div id="admin-section" class="hidden max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Tableau de bord - Mennais401</h2>
            <button onclick="fermerAdmin()" class="text-slate-500 underline text-sm">Retour</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b bg-slate-50 text-slate-600">
                        <th class="p-3 font-semibold">Élève</th>
                        <th class="p-3 font-semibold">Dernière activité</th>
                        <th class="p-3 font-semibold">Semaine 1</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDIJAy8ObBV6BeaIXJjrMkCfvtY4S7xBcM",

    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentUser = "";
    let questions = [];
    let currentQuestionIdx = 0;
    let score = 0;

    // --- CETTE LIGNE EST CRUCIALE POUR QUE LE BOUTON FONCTIONNE ---
    window.connexion = async function() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        
        if(!name) {
            alert("N'oublie pas d'entrer ton prénom !");
            return;
        }
        
        try {
            currentUser = name;
            // On enregistre l'élève dans Firebase [cite: 1]
            await setDoc(doc(db, "students", name.toLowerCase()), { 
                name: name, 
                lastSeen: new Date() 
            }, { merge: true });

            document.getElementById('display-name').innerText = name;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('hub-section').classList.remove('hidden');
        } catch (error) {
            console.error("Erreur Firebase:", error);
            alert("Erreur de connexion. Vérifie ta console.");
        }
    };

    // Rendons aussi les autres fonctions accessibles au HTML
    window.lancerQuiz = (semaine) => {

    };

    window.ouvrirAdmin = async () => {

    };
</script>
</body>
</html>
