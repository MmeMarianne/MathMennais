<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths 4e - Portail Élève</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-indigo-700 p-4 text-white shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold italic">M. Mennais - Maths 4e</h1>
        <button onclick="ouvrirAdmin()" class="text-xs opacity-70 hover:opacity-100 uppercase tracking-widest">Accès Prof</button>
    </nav>

    <div id="auth-section" class="max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center mb-8">
            <span class="text-5xl">🦊</span>
            <h2 class="text-2xl font-black text-slate-800 mt-4">Prêt pour le défi ?</h2>
        </div>
        <input type="text" id="studentName" placeholder="Ton prénom" class="w-full p-4 bg-slate-100 border-2 border-transparent rounded-xl mb-4 focus:border-indigo-500 focus:outline-none text-lg">
        <button onclick="connexion()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-105 shadow-lg">COMMENCER</button>
    </div>

    <div id="hub-section" class="hidden max-w-5xl mx-auto p-6">
        <div class="flex justify-between items-end mb-8">
            <div>
                <p class="text-slate-500 font-medium">Bonjour,</p>
                <h2 id="display-name" class="text-4xl font-black text-slate-800">Élève</h2>
            </div>
            <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                <span class="text-sm text-slate-500">Étape actuelle :</span>
                <span class="block font-bold text-indigo-600">1 - Fondations [cite: 3]</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="modules-grid">
            <div onclick="lancerQuiz(1)" class="bg-white p-6 rounded-2xl shadow-sm border-2 border-white hover:border-indigo-400 cursor-pointer transition-all group">
                <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <span class="text-2xl">🔢</span>
                </div>
                <h3 class="text-xl font-bold text-slate-800">Semaine 1</h3>
                <p class="text-slate-500 text-sm mt-2">Nombres naturels : position, valeur, lire et écrire. </p>
                <div class="mt-6 flex items-center text-indigo-600 font-bold text-sm">
                    JOUER MAINTENANT →
                </div>
            </div>
        </div>
    </div>

    <div id="quiz-section" class="hidden max-w-2xl mx-auto mt-10 p-8 bg-white rounded-3xl shadow-2xl border-4 border-indigo-100">
        <div class="flex justify-between items-center mb-8">
            <span id="question-count" class="text-sm font-bold bg-slate-100 px-3 py-1 rounded-full text-slate-600">Question 1/5</span>
            <button onclick="quitterQuiz()" class="text-slate-400 hover:text-red-500">✕ Quitter</button>
        </div>
        <div id="question-container" class="text-center">
            <h3 id="question-text" class="text-2xl font-bold text-slate-800 mb-8 leading-relaxed">Chargement...</h3>
            <input type="text" id="answer-input" class="w-full p-4 border-b-4 border-indigo-200 text-3xl text-center focus:outline-none focus:border-indigo-500 mb-8" placeholder="Ta réponse">
            <button onclick="verifierReponse()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg transition shadow-green-200">VALIDER</button>
        </div>
    </div>

    <div id="admin-section" class="hidden max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Tableau de bord - Mennais401</h2>
            <button onclick="fermerAdmin()" class="text-slate-500 underline text-sm">Retour</button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b bg-slate-50 text-slate-600">
                        <th class="p-3 font-semibold">Élève</th>
                        <th class="p-3 font-semibold">Dernière activité</th>
                        <th class="p-3 font-semibold">Semaine 1</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIJAy8ObBV6BeaIXJjrMkCfvtY4S7xBcM",
            authDomain: "sitemath-197b3.firebaseapp.com",
            projectId: "sitemath-197b3",
            storageBucket: "sitemath-197b3.firebasestorage.app",
            messagingSenderId: "118958876405",
            appId: "1:118958876405:web:e784ecf8e0d0a678e407bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = "";
        let questions = [];
        let currentQuestionIdx = 0;
        let score = 0;

        // --- SYSTÈME DE CONNEXION ---
        window.connexion = async () => {
            const name = document.getElementById('studentName').value.trim();
            if(!name) return alert("Indique ton prénom !");
            
            currentUser = name;
            await setDoc(doc(db, "students", name.toLowerCase()), { 
                name: name, 
                lastSeen: new Date() 
            }, { merge: true });

            document.getElementById('display-name').innerText = name;
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('hub-section').classList.remove('hidden');
        };

        // --- GÉNÉRATEUR ALÉATOIRE (SEMAINE 1) ---
        window.lancerQuiz = (semaine) => {
            questions = [];
            for(let i=0; i<5; i++) {
                questions.push(genererQuestionSemaine1());
            }
            currentQuestionIdx = 0;
            score = 0;
            document.getElementById('hub-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            afficherQuestion();
        };

        function genererQuestionSemaine1() {
            const types = ["position", "valeur", "bonds", "ecriture"];
            const type = types[Math.floor(Math.random() * types.length)];
            const nbr = Math.floor(Math.random() * 9000) + 1000; // Nombre entre 1000 et 9999 

            if(type === "position") {
                return { q: `Dans le nombre **${nbr}**, quel chiffre occupe la position des **centaines** ?`, r: nbr.toString().charAt(1) };
            } else if(type === "valeur") {
                const digit = nbr.toString().charAt(0);
                return { q: `Quelle est la valeur du chiffre **${digit}** dans le nombre **${nbr}** ?`, r: (parseInt(digit)*1000).toString() };
            } else if(type === "bonds") {
                const bond = 10;
                return { q: `Complète la suite : ${nbr}, ${nbr+bond}, ${nbr+(bond*2)}, ...`, r: (nbr+(bond*3)).toString() };
            } else {
                return { q: `Combien y a-t-il de dizaines **au total** dans ${nbr} ?`, r: Math.floor(nbr/10).toString() };
            }
        }

        function afficherQuestion() {
            const q = questions[currentQuestionIdx];
            document.getElementById('question-count').innerText = `Question ${currentQuestionIdx + 1}/5`;
            document.getElementById('question-text').innerHTML = q.q;
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        }

        window.verifierReponse = async () => {
            const userAns = document.getElementById('answer-input').value.trim();
            if(userAns === questions[currentQuestionIdx].r) {
                score++;
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
            }

            currentQuestionIdx++;
            if(currentQuestionIdx < questions.length) {
                afficherQuestion();
            } else {
                await terminerQuiz();
            }
        };

        async function terminerQuiz() {
            const finalScore = (score / questions.length) * 100;
            const studentRef = doc(db, "students", currentUser.toLowerCase());
            await setDoc(studentRef, {
                resultats: { semaine1: finalScore + "%" }
            }, { merge: true });

            alert(`Fini ! Ton score : ${score}/5 (${finalScore}%)`);
            location.reload();
        }

        // --- HUB ENSEIGNANT ---
        window.ouvrirAdmin = async () => {
            const pass = prompt("Mot de passe enseignant :");
            if(pass === "Mennais401") {
                document.getElementById('hub-section').classList.add('hidden');
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('admin-section').classList.remove('hidden');
                chargerDonneesAdmin();
            } else {
                alert("Accès refusé");
            }
        };

        async function chargerDonneesAdmin() {
            const querySnapshot = await getDocs(collection(db, "students"));
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                tbody.innerHTML += `
                    <tr class="border-b hover:bg-slate-50">
                        <td class="p-3 font-bold">${data.name}</td>
                        <td class="p-3 text-sm text-slate-500">${data.lastSeen?.toDate().toLocaleDateString() || '-'}</td>
                        <td class="p-3 text-indigo-600 font-bold">${data.resultats?.semaine1 || 'Pas encore fait'}</td>
                    </tr>
                `;
            });
        }

        window.quitterQuiz = () => location.reload();
        window.fermerAdmin = () => location.reload();
    </script>
</body>
</html>
